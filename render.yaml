# Render Blueprint — EXECUTOR only (its own, SEPARATE Render account).
# Build context is this folder, so it works as a Blueprint whether this folder is
# its own repo root or you create the service manually with Root Directory=executor.
#
# Deploy: Render Dashboard (executor account) -> New -> Blueprint -> this folder/repo.
# For LIVE: switch plan to a paid tier (always-on, no cold start) and attach the
# persistent disk below so dedup/open-position state survives restarts.
services:
  - type: web
    name: btc-executor
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: EXECUTOR_TOKEN
        sync: false                 # must match the brain's EXECUTOR_TOKEN
      - key: BRAIN_URL
        sync: false                 # https://<brain-space>.hf.space (live-feed target)
      - key: WEBHOOK_TOKEN
        sync: false                 # must match the brain's WEBHOOK_TOKEN
      - key: POLL_INTERVAL
        value: "60"
      - key: SKIP_SAME_DAY_EXPIRY
        value: "true"
      - key: MIN_EXPIRY_HOURS
        value: "3"
      - key: LIVE
        value: "false"              # starts dry-run; flip via POST /admin/mode
      - key: BINANCE_API_KEY
        sync: false                 # only needed in LIVE
      - key: BINANCE_API_SECRET
        sync: false
      - key: BINANCE_EAPI
        value: https://eapi.binance.com
      - key: REPRICE_AT_ORDER
        value: "true"
      - key: MAX_OPEN_PER_STRATEGY
        value: "1"
      - key: MAX_OPEN_TOTAL
        value: "12"
      - key: DAILY_LOSS_LIMIT
        value: "0"
    # For live, uncomment to persist executor state across restarts (paid plan):
    # disk:
    #   name: executor-data
    #   mountPath: /data
    #   sizeGB: 1
